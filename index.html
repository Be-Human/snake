<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇游戏</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <div class="main-content">
      <div class="left-section">
        <h2 class="leaderboard-title">排行榜</h2>
        <div id="leaderboard" class="leaderboard">
          <div class="leaderboard-placeholder">暂无记录</div>
        </div>
        
        <h2 class="achievements-title">成就列表</h2>
        <div id="achievements" class="achievements">
        </div>
      </div>
      
      <div class="game-section">
        <h1 class="game-title">贪吃蛇</h1>
        
        <div class="skin-selector">
          <button class="skin-button active" data-skin="classic">经典</button>
          <button class="skin-button" data-skin="neon">霓虹</button>
          <button class="skin-button" data-skin="minimal">极简</button>
        </div>
        
        <div class="score-container">
          <div><span class="score-label">得分:</span> <span id="score">0</span></div>
          <div><span class="score-label">关卡:</span> <span id="level">1</span></div>
          <div><span class="score-label">最高分:</span> <span id="highScore">0</span></div>
        </div>
        
        <div id="activePowerupContainer" class="powerup-container" style="display: none;">
          <div class="active-powerup-label">当前道具:</div>
          <div id="activePowerupInfo" class="active-powerup-info">
            <span id="activePowerupIcon" class="powerup-icon"></span>
            <span id="activePowerupName" class="powerup-name"></span>
            <span id="activePowerupTimer" class="powerup-timer"></span>
          </div>
        </div>
        
        <div class="canvas-wrapper">
          <canvas id="gameCanvas"></canvas>
          
          <div id="startScreen" class="overlay">
            <h2 class="overlay-title">准备开始</h2>
            <p class="overlay-subtitle">选择难度后点击或按任意方向键开始游戏</p>
            
            <div class="difficulty-selector">
              <div class="difficulty-label">选择难度：</div>
              <div class="difficulty-buttons">
                <button class="difficulty-button" data-difficulty="easy">
                  <div class="difficulty-name">简单</div>
                  <div class="difficulty-desc">慢速 · 少障碍 · 无毒药</div>
                </button>
                <button class="difficulty-button active" data-difficulty="normal">
                  <div class="difficulty-name">普通</div>
                  <div class="difficulty-desc">中速 · 中等障碍 · 有毒药</div>
                </button>
                <button class="difficulty-button" data-difficulty="hard">
                  <div class="difficulty-name">困难</div>
                  <div class="difficulty-desc">快速 · 多障碍 · 有毒药</div>
                </button>
              </div>
            </div>
            
            <p class="instructions">
              操作方式：<br>
              <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向<br>
              吃到食物得分，速度逐渐加快，撞墙或撞自己游戏结束
            </p>
          </div>
          
          <div id="gameOverScreen" class="overlay">
            <h2 class="overlay-title">游戏结束</h2>
            <p class="final-score">最终得分: <span id="finalScore">0</span></p>
            <p class="final-score">最高分: <span id="finalHighScore">0</span></p>
            
            <div id="nameInputSection" class="name-input-section" style="display: none;">
              <p class="congratulations-text">恭喜！你进入了排行榜前5名！</p>
              <div class="input-wrapper">
                <input type="text" id="playerName" placeholder="请输入你的昵称（最多10个字符）" maxlength="10" class="name-input">
                <button id="submitNameButton" class="button small-button">确认</button>
              </div>
            </div>
            
            <button id="restartButton" class="button">重新开始</button>
          </div>
        </div>
      </div>
      
      <div class="right-section">
        <h2 class="powerups-title">道具说明</h2>
        <div id="powerups" class="powerups">
          <div class="powerup-item">
            <div class="powerup-icon">⏰</div>
            <div class="powerup-info">
              <div class="powerup-name">时钟</div>
              <div class="powerup-desc">按住方向键才移动，松开停止</div>
            </div>
          </div>
          <div class="powerup-item">
            <div class="powerup-icon">🛡️</div>
            <div class="powerup-info">
              <div class="powerup-name">金身</div>
              <div class="powerup-desc">可穿透障碍物而不死亡</div>
            </div>
          </div>
          <div class="powerup-item">
            <div class="powerup-icon">⚔️</div>
            <div class="powerup-info">
              <div class="powerup-name">武器</div>
              <div class="powerup-desc">撞到障碍物时消除该障碍</div>
            </div>
          </div>
          <div class="powerup-item">
            <div class="powerup-icon">⚡</div>
            <div class="powerup-info">
              <div class="powerup-name">加速</div>
              <div class="powerup-desc">移动速度临时提升50%</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div id="achievementNotification" class="achievement-notification">
    <div class="achievement-icon">🏆</div>
    <div class="achievement-content">
      <div class="achievement-title">成就解锁！</div>
      <div class="achievement-name" id="achievementName"></div>
    </div>
  </div>
  
  <script src="src/constants.js"></script>
  <script src="src/food.js"></script>
  <script src="src/powerup.js"></script>
  <script src="src/snake.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
